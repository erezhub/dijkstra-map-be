services:

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  map-service:
    image: map-service:latest
    build:
      context: .
      dockerfile: DockerfileMapService
    container_name: map-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGODB_MAP_URI: mongodb://admin:password@mongodb:27017/dijkstra-map?authSource=admin
      MONGODB_MAP_DATABASE: dijkstra-map
      MONGODB_USERS_URI: mongodb://admin:password@mongodb:27017/dijkstra-users?authSource=admin
      SPRING_RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: dijkstra.events
      RABBITMQ_QUEUE_ROUTE__RECALCULATION: map-service.route-recalculation
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    image: user-service:latest
    build:
      context: .
      dockerfile: DockerfileUserService
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/dijkstra-users?authSource=admin
      MONGODB_DATABASE: dijkstra-users
      TOKEN_EXPIRATION_MS: 86400000
      ADMIN_DEFAULT_PASSWORD: admin
      SPRING_RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: dijkstra.events
      RABBITMQ_ROUTING__KEY_USER__CREATED: user.created
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    image: notification-service:latest
    build:
      context: .
      dockerfile: DockerfileNotificationService
    container_name: notification-service
    restart: unless-stopped
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_MAIL_HOST: mailhog
      RABBITMQ_EXCHANGE: dijkstra.events
      RABBITMQ_QUEUE_USER__CREATED: notification.user.created
      RABBITMQ_ROUTING__KEY_USER__CREATED: user.created
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started

  frontend:
    image: dijkstra-map-fe:latest
    build:
      context: ../dijkstra-map-fe
      dockerfile: Dockerfile
      args:
        VITE_MAP_URL: ${VITE_MAP_URL:-http://localhost:8080}
        VITE_USER_URL: ${VITE_USER_URL:-http://localhost:8081}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - map-service
      - user-service

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo-data:
